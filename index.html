<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marz for U ♥</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ══ VIEW: LISTA PLAYLIST ══ -->
<div id="view-home" class="view active">
  <header class="hero">
    <div class="hero-label">YouTube Music</div>
    <h1>Marz for U <span>&#9829;</span></h1>
    <p>Clicca una playlist per il dettaglio · apri in SimpMusic dalla pagina interna</p>
    <div class="search-wrap">
      <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search" class="search-input" type="search" placeholder="Cerca brano, artista o playlist…" />
    </div>
    <div id="index-progress" class="index-progress">
      <div class="index-bar" id="index-bar"></div>
    </div>
    <div id="index-status" class="index-status"></div>
  </header>

  <!-- risultati ricerca globale -->
  <section class="grid-section hidden" id="search-results-section">
    <div class="count" id="search-results-count"></div>
    <div class="track-list" id="search-results-list"></div>
  </section>

  <section class="grid-section" id="groups-section">
    <div class="count" id="count"></div>

    <div id="section-marz3" class="group-section">
      <h2 class="group-title">Marz III</h2>
      <div class="grid" id="grid-marz3"></div>
    </div>

    <div id="section-marz2" class="group-section">
      <h2 class="group-title">Marz II</h2>
      <div class="grid" id="grid-marz2"></div>
    </div>

    <div id="section-marz1" class="group-section">
      <h2 class="group-title">Marz</h2>
      <div class="grid" id="grid-marz1">
        <div class="loader"><div class="spinner"></div> Carico playlist…</div>
      </div>
    </div>
  </section>

</div>

<!-- ══ VIEW: DETTAGLIO PLAYLIST ══ -->
<div id="view-detail" class="view">
  <div class="detail-content">
    <button type="button" class="back-btn" id="back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15,18 9,12 15,6"/>
      </svg>
      Tutte le playlist
    </button>

    <div class="detail-header">
      <div class="detail-thumb">
        <img id="detail-thumb" src="" alt="" />
      </div>
      <div class="detail-info">
        <h2 id="detail-title" aria-label="Titolo playlist">&nbsp;</h2>
        <p id="detail-meta"></p>
        <a class="simp-btn" id="detail-simp-btn" href="#">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
          Apri in SimpMusic
        </a>
      </div>
    </div>

    <div class="track-search-wrap">
      <svg class="icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="track-search" class="search-input" type="search" placeholder="Cerca canzone o artista…" />
    </div>

    <div class="track-list" id="track-list">
      <div class="loader"><div class="spinner"></div> Carico tracce…</div>
    </div>
  </div>
</div>

<footer>
  Canale: UCb2xW4Ns3OlQYUzemQHRWCg &nbsp;·&nbsp; YouTube Data API v3
</footer>

<script src="app.js"></script>
</body>
</html>
